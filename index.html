<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱門股券商進出排行</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
      font-size: 13px;
      background: #eef1f6;
      color: #1a1a2e;
    }

    /* ── 頁首 ── */
    .header {
      background: linear-gradient(135deg, #1a3a6b 0%, #2563a8 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .tab-group { display: flex; gap: 6px; }

    .tab-btn {
      padding: 5px 14px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.15); }
    .tab-btn.active {
      background: white;
      color: #1a3a6b;
      font-weight: bold;
      border-color: white;
    }

    .refresh-btn {
      padding: 5px 12px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); }

    .update-time {
      font-size: 11px;
      opacity: 0.75;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── 主內容 ── */
    .content { padding: 14px; max-width: 1400px; margin: 0 auto; }

    .loading { text-align: center; padding: 60px; color: #666; font-size: 14px; }
    .error { text-align: center; padding: 30px; color: #c00; font-size: 13px; }

    /* ── 卡片區塊 ── */
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .card-title {
      background: linear-gradient(90deg, #1a3a6b, #2563a8);
      color: white;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    /* ── 彙總表 ── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .sum-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sum-table th {
      background: #dde6f0;
      color: #1a3a6b;
      padding: 5px 10px;
      font-size: 12px;
      text-align: center;
      border-bottom: 1px solid #c5d0de;
    }
    .sum-table td {
      padding: 4px 10px;
      border-bottom: 1px solid #edf0f4;
      font-size: 12px;
    }
    .sum-table td:first-child { color: #333; }
    .sum-table td:last-child { text-align: right; font-weight: bold; }
    .sum-table tr:hover td { background: #f5f8fc; }

    /* 左右分隔線 */
    .sum-table:first-child { border-right: 1px solid #d0d9e4; }

    /* ── 主明細表 ── */
    .detail-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .main-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }
    .main-table thead th {
      background: #dde6f0;
      color: #1a3a6b;
      padding: 7px 10px;
      text-align: center;
      border-bottom: 2px solid #b0c4d8;
      white-space: nowrap;
      font-size: 12px;
      position: sticky;
      top: 48px;
    }
    .main-table td {
      padding: 4px 10px;
      border-bottom: 1px solid #edf0f4;
      font-size: 12px;
    }
    .main-table tbody tr:not(.stock-hdr) td:first-child { text-align: center; color: #666; width: 40px; }
    .main-table td:nth-child(3),
    .main-table td:nth-child(4),
    .main-table td:nth-child(5) { text-align: right; }
    .main-table tbody tr:not(.stock-hdr):hover td { background: #f5f8fc; }

    /* 股票標題列 */
    .main-table tbody tr.stock-hdr td {
      background: linear-gradient(90deg, #1a3a6b, #2563a8);
      color: white;
      font-weight: bold;
      padding: 6px 10px;
      font-size: 13px;
      border-bottom: none;
    }
    .main-table tbody tr.stock-hdr td:last-child { text-align: right; }
    .main-table tbody tr.stock-hdr:hover td { filter: brightness(1.1); }

    /* ── 顏色（台股慣例：正=紅 / 負=綠）── */
    .pos { background: #ffe4e4 !important; color: #c0392b; font-weight: bold; }
    .neg { background: #e4f4e4 !important; color: #27ae60; font-weight: bold; }

    /* stock-hdr 內的 pos/neg 加深一點以在深藍底上顯示 */
    .stock-hdr .pos { background: #ff9999 !important; color: #7b0000; border-radius: 3px; padding: 1px 5px; }
    .stock-hdr .neg { background: #99dd99 !important; color: #145214; border-radius: 3px; padding: 1px 5px; }

    /* ── 手機版 ── */
    @media (max-width: 600px) {
      .content { padding: 8px; }
      .summary-grid { grid-template-columns: 1fr; }
      .sum-table:first-child { border-right: none; border-bottom: 1px solid #d0d9e4; }
      .header h1 { font-size: 13px; }
      .update-time { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>熱門股券商進出排行</h1>
  <div class="tab-group">
    <button class="tab-btn active" id="btn-amt" onclick="switchTab('amt')">依成交金額</button>
    <button class="tab-btn" id="btn-vol" onclick="switchTab('vol')">依成交張數</button>
  </div>
  <button class="refresh-btn" onclick="manualRefresh()">↻ 重新整理</button>
  <span class="update-time" id="update-time">載入中...</span>
</div>

<div class="content">
  <div id="main-content" class="loading">資料載入中...</div>
</div>

<script>
  let currentTab = 'amt';
  let cache = {};

  function fmt(n) {
    return n == null ? '-' : n.toLocaleString();
  }

  function netClass(n) {
    if (n > 0) return 'pos';
    if (n < 0) return 'neg';
    return '';
  }

  function netText(n) {
    if (n == null) return '-';
    return (n > 0 ? '+' : '') + n.toLocaleString();
  }

  async function loadData(mode) {
    document.getElementById('main-content').innerHTML = '<div class="loading">載入中...</div>';
    try {
      const resp = await fetch(`data/${mode}.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      cache[mode] = data;
      render(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error">載入失敗：${e.message}<br><small>請確認 GitHub Actions 已執行過一次</small></div>`;
    }
  }

  function render(data) {
    const { unit, stocks, updated_at } = data;
    document.getElementById('update-time').textContent = `資料時間：${updated_at}`;

    // ── 彙總表 ──
    const half = Math.ceil(stocks.length / 2);
    const left  = stocks.slice(0, half);
    const right = stocks.slice(half);

    function sumRows(arr) {
      return arr.map(s => `
        <tr>
          <td>${s.rank} - ${s.name}(${s.code})</td>
          <td class="${netClass(s.total_net)}">${netText(s.total_net)}</td>
        </tr>`).join('');
    }

    const summaryHtml = `
      <div class="card">
        <div class="card-title">各股買賣超合計（${unit}）</div>
        <div class="summary-grid">
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(left)}
          </table>
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(right)}
          </table>
        </div>
      </div>`;

    // ── 明細表 ──
    const buyLabel  = unit === '千元' ? '買進金額(千元)' : '總買量(張)';
    const sellLabel = unit === '千元' ? '賣出金額(千元)' : '總賣量(張)';

    const detailRows = stocks.map(s => `
      <tr class="stock-hdr">
        <td colspan="4">${s.rank} - ${s.name}(${s.code})</td>
        <td><span class="${netClass(s.total_net)}">${netText(s.total_net)}</span></td>
      </tr>
      ${s.brokers.map(b => `
        <tr>
          <td>${b.rank}</td>
          <td>${b.name}</td>
          <td>${fmt(b.buy)}</td>
          <td>${fmt(b.sell)}</td>
          <td class="${netClass(b.net)}">${netText(b.net)}</td>
        </tr>`).join('')}
    `).join('');

    const detailHtml = `
      <div class="card">
        <div class="card-title">券商明細</div>
        <div class="detail-wrap">
          <table class="main-table">
            <thead>
              <tr>
                <th>排行</th>
                <th>證商名稱</th>
                <th>${buyLabel}</th>
                <th>${sellLabel}</th>
                <th>買賣超 (${unit})</th>
              </tr>
            </thead>
            <tbody>${detailRows}</tbody>
          </table>
        </div>
      </div>`;

    document.getElementById('main-content').innerHTML = summaryHtml + detailHtml;
  }

  function switchTab(mode) {
    currentTab = mode;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${mode}`).classList.add('active');
    cache[mode] ? render(cache[mode]) : loadData(mode);
  }

  function manualRefresh() {
    delete cache[currentTab];
    loadData(currentTab);
  }

  // 每小時自動刷新
  setInterval(() => { delete cache[currentTab]; loadData(currentTab); }, 60 * 60 * 1000);

  loadData('amt');
</script>
</body>
</html>
