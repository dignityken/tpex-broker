<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱門股券商進出排行</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
      font-size: 13px;
      background: #eef1f6;
      color: #1a1a2e;
    }

    /* ── 頁首 ── */
    .header {
      background: linear-gradient(135deg, #1a3a6b 0%, #2563a8 100%);
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; white-space: nowrap; }

    .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.3); }

    .tab-group { display: flex; gap: 6px; }

    .tab-btn {
      padding: 5px 14px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.15); }
    .tab-btn.active { background: white; color: #1a3a6b; font-weight: bold; border-color: white; }

    /* 歷史模式按鈕：用不同底色區隔 */
    .mode-btn {
      padding: 5px 14px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.15); }
    .mode-btn.active { background: #f0a500; color: #fff; border-color: #f0a500; font-weight: bold; }

    .refresh-btn {
      padding: 5px 12px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); }

    /* 日期選擇區 */
    #hist-controls { display: none; align-items: center; gap: 6px; }
    #hist-controls input[type=date] {
      padding: 4px 8px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 12px;
      outline: none;
    }
    #hist-controls input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    .query-btn {
      padding: 5px 14px;
      border: none;
      border-radius: 20px;
      background: #f0a500;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all .2s;
    }
    .query-btn:hover { background: #d4920a; }

    .update-time { font-size: 11px; opacity: 0.75; margin-left: auto; white-space: nowrap; }

    /* ── 主內容 ── */
    .content { padding: 14px; max-width: 1400px; margin: 0 auto; }
    .loading { text-align: center; padding: 60px; color: #666; font-size: 14px; }
    .error { text-align: center; padding: 30px; color: #c00; font-size: 13px; }

    /* ── 卡片 ── */
    .card { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 14px; }
    .card-title { background: linear-gradient(90deg, #1a3a6b, #2563a8); color: white; padding: 8px 14px; font-weight: bold; font-size: 13px; }

    /* ── 彙總表 ── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .sum-table { width: 100%; border-collapse: collapse; }
    .sum-table th { background: #dde6f0; color: #1a3a6b; padding: 5px 10px; font-size: 12px; text-align: center; border-bottom: 1px solid #c5d0de; }
    .sum-table td { padding: 4px 10px; border-bottom: 1px solid #edf0f4; font-size: 12px; }
    .sum-table td:first-child { color: #333; }
    .sum-table td:last-child { text-align: right; font-weight: bold; }
    .sum-table tr:hover td { background: #f5f8fc; }
    .sum-table:first-child { border-right: 1px solid #d0d9e4; }

    /* ── 明細表 ── */
    .detail-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .main-table { width: 100%; border-collapse: collapse; min-width: 480px; }
    .main-table thead th { background: #dde6f0; color: #1a3a6b; padding: 7px 10px; text-align: center; border-bottom: 2px solid #b0c4d8; white-space: nowrap; font-size: 12px; }
    .main-table td { padding: 4px 10px; border-bottom: 1px solid #edf0f4; font-size: 12px; }
    .main-table tbody tr:not(.stock-hdr) td:first-child { text-align: center; color: #666; width: 40px; }
    .main-table td:nth-child(3), .main-table td:nth-child(4), .main-table td:nth-child(5) { text-align: right; }
    .main-table tbody tr:not(.stock-hdr):hover td { background: #f5f8fc; }

    .main-table tbody tr.stock-hdr td { background: linear-gradient(90deg, #1a3a6b, #2563a8); color: white; font-weight: bold; padding: 6px 10px; font-size: 13px; border-bottom: none; }
    .main-table tbody tr.stock-hdr td:last-child { text-align: right; }
    .main-table tbody tr.stock-hdr:hover td { filter: brightness(1.1); }

    /* ── 顏色（台股：正=紅 / 負=綠）── */
    .pos { background: #ffe4e4 !important; color: #c0392b; font-weight: bold; }
    .neg { background: #e4f4e4 !important; color: #27ae60; font-weight: bold; }
    .stock-hdr .pos { background: #ff9999 !important; color: #7b0000; border-radius: 3px; padding: 1px 5px; }
    .stock-hdr .neg { background: #99dd99 !important; color: #145214; border-radius: 3px; padding: 1px 5px; }

    /* ── 手機版 ── */
    @media (max-width: 600px) {
      .content { padding: 8px; }
      .summary-grid { grid-template-columns: 1fr; }
      .sum-table:first-child { border-right: none; border-bottom: 1px solid #d0d9e4; }
      .header h1 { font-size: 13px; }
      .update-time { width: 100%; margin-left: 0; }
      .divider { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>熱門股券商進出排行</h1>

  <!-- 即時 / 歷史 模式 -->
  <div class="tab-group">
    <button class="mode-btn active" id="mode-live" onclick="switchMode('live')">即時</button>
    <button class="mode-btn" id="mode-hist" onclick="switchMode('hist')">歷史</button>
  </div>

  <div class="divider"></div>

  <!-- 金額 / 張數 tab -->
  <div class="tab-group">
    <button class="tab-btn active" id="btn-amt" onclick="switchTab('amt')">依成交金額</button>
    <button class="tab-btn" id="btn-vol" onclick="switchTab('vol')">依成交張數</button>
  </div>

  <!-- 即時：重新整理 -->
  <button class="refresh-btn" id="live-refresh" onclick="manualRefresh()">↻ 重新整理</button>

  <!-- 歷史：日期選擇 -->
  <div id="hist-controls">
    <input type="date" id="hist-date">
    <button class="query-btn" onclick="queryHistory()">查詢</button>
  </div>

  <span class="update-time" id="update-time">載入中...</span>
</div>

<div class="content">
  <div id="main-content" class="loading">資料載入中...</div>
</div>

<script>
  let currentMode = 'live'; // 'live' | 'hist'
  let currentTab  = 'amt';  // 'amt' | 'vol'
  let liveCache   = {};

  const CORS = 'https://corsproxy.io/?';
  const HIST_URLS = {
    amt: date => `https://www.tpex.org.tw/www/zh-tw/afterTrading/brokerAmt?date=${encodeURIComponent(date)}&id=&response=html`,
    vol: date => `https://www.tpex.org.tw/www/zh-tw/afterTrading/brokerVol?date=${encodeURIComponent(date)}&id=&response=html`,
  };
  const UNITS = { amt: '千元', vol: '張' };

  // ── 工具函式 ──
  function fmt(n) { return n == null ? '-' : n.toLocaleString(); }
  function netClass(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : ''; }
  function netText(n) { if (n == null) return '-'; return (n > 0 ? '+' : '') + n.toLocaleString(); }

  function parseNum(s) {
    s = String(s).trim().replace(/,/g, '');
    if (!s || s === '-' || s.toUpperCase() === 'FALSE') return null;
    const n = parseFloat(s);
    return isNaN(n) ? null : Math.round(n);
  }

  // ── HTML 表格解析（給歷史模式用）──
  function parseHtmlTable(htmlText, unit) {
    const doc = new DOMParser().parseFromString(htmlText, 'text/html');
    let mainTable = null;
    for (const t of doc.querySelectorAll('table')) {
      const txt = t.textContent;
      if (txt.includes('元大') && txt.includes('凱基') && txt.includes('富邦')) {
        mainTable = t; break;
      }
    }
    if (!mainTable) throw new Error('找不到主表格，可能是假日或尚未收盤');

    const stocks = [];
    let cur = null;
    const pat = /(\d+)\s*[-－]\s*(.+?)\((\d+[A-Z*]*)\)/;

    for (const row of mainTable.querySelectorAll('tr')) {
      const cells = [...row.querySelectorAll('td, th')];
      if (!cells.length) continue;
      const texts = cells.map(c => c.textContent.trim());
      if (texts[0] === '排行' || texts[0] === '') continue;

      const full = texts.join(' ');
      const m = full.match(pat);
      const isHdr = m && (cells.length <= 2 || !/^\d+$/.test(texts[0]));

      if (isHdr) {
        if (cur) stocks.push(cur);
        cur = { rank: +m[1], name: m[2].trim(), code: m[3], brokers: [] };
        continue;
      }
      if (cur && cells.length >= 4 && /^\d+$/.test(texts[0])) {
        const buy = parseNum(texts[2]), sell = parseNum(texts[3]);
        if (buy !== null && sell !== null)
          cur.brokers.push({ rank: +texts[0], name: texts[1], buy, sell, net: buy - sell });
      }
    }
    if (cur) stocks.push(cur);
    stocks.forEach(s => { s.total_net = s.brokers.reduce((a, b) => a + b.net, 0); });

    return { stocks, unit };
  }

  // ── 即時模式：讀 JSON ──
  async function loadLive(tab) {
    document.getElementById('main-content').innerHTML = '<div class="loading">載入中...</div>';
    try {
      const resp = await fetch(`data/${tab}.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      liveCache[tab] = data;
      render(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error">載入失敗：${e.message}<br><small>請確認 GitHub Actions 已執行過一次</small></div>`;
    }
  }

  // ── 歷史模式：CORS proxy 抓 HTML ──
  async function loadHistory(tab, date) {
    document.getElementById('main-content').innerHTML = '<div class="loading">查詢中...</div>';
    try {
      const url = CORS + HIST_URLS[tab](date);
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const html = await resp.text();
      const data = parseHtmlTable(html, UNITS[tab]);
      document.getElementById('update-time').textContent = `歷史資料：${date}`;
      render(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error">查詢失敗：${e.message}</div>`;
    }
  }

  // ── 渲染（即時 & 歷史共用）──
  function render(data) {
    const { unit, stocks } = data;
    if (data.updated_at)
      document.getElementById('update-time').textContent = `資料時間：${data.updated_at}`;

    const half = Math.ceil(stocks.length / 2);
    function sumRows(arr) {
      return arr.map(s => `<tr>
        <td>${s.rank} - ${s.name}(${s.code})</td>
        <td class="${netClass(s.total_net)}">${netText(s.total_net)}</td>
      </tr>`).join('');
    }

    const summaryHtml = `
      <div class="card">
        <div class="card-title">各股買賣超合計（${unit}）</div>
        <div class="summary-grid">
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(stocks.slice(0, half))}
          </table>
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(stocks.slice(half))}
          </table>
        </div>
      </div>`;

    const buyLabel  = unit === '千元' ? '買進金額(千元)' : '總買量(張)';
    const sellLabel = unit === '千元' ? '賣出金額(千元)' : '總賣量(張)';

    const detailRows = stocks.map(s => `
      <tr class="stock-hdr">
        <td colspan="4">${s.rank} - ${s.name}(${s.code})</td>
        <td><span class="${netClass(s.total_net)}">${netText(s.total_net)}</span></td>
      </tr>
      ${s.brokers.map(b => `<tr>
        <td>${b.rank}</td><td>${b.name}</td>
        <td>${fmt(b.buy)}</td><td>${fmt(b.sell)}</td>
        <td class="${netClass(b.net)}">${netText(b.net)}</td>
      </tr>`).join('')}`).join('');

    const detailHtml = `
      <div class="card">
        <div class="card-title">券商明細</div>
        <div class="detail-wrap">
          <table class="main-table">
            <thead><tr>
              <th>排行</th><th>證商名稱</th>
              <th>${buyLabel}</th><th>${sellLabel}</th><th>買賣超 (${unit})</th>
            </tr></thead>
            <tbody>${detailRows}</tbody>
          </table>
        </div>
      </div>`;

    document.getElementById('main-content').innerHTML = summaryHtml + detailHtml;
  }

  // ── 切換即時 / 歷史 ──
  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`mode-${mode}`).classList.add('active');

    const isHist = mode === 'hist';
    document.getElementById('hist-controls').style.display = isHist ? 'flex' : 'none';
    document.getElementById('live-refresh').style.display  = isHist ? 'none' : '';

    if (mode === 'live') {
      liveCache[currentTab] ? render(liveCache[currentTab]) : loadLive(currentTab);
    } else {
      document.getElementById('main-content').innerHTML =
        '<div class="loading">請選擇日期後按查詢</div>';
      document.getElementById('update-time').textContent = '';
    }
  }

  // ── 切換金額 / 張數 ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${tab}`).classList.add('active');

    if (currentMode === 'live') {
      liveCache[tab] ? render(liveCache[tab]) : loadLive(tab);
    } else {
      const date = document.getElementById('hist-date').value;
      if (date) loadHistory(tab, date.replace(/-/g, '/'));
    }
  }

  // ── 即時重新整理 ──
  function manualRefresh() {
    delete liveCache[currentTab];
    loadLive(currentTab);
  }

  // ── 歷史查詢 ──
  function queryHistory() {
    const date = document.getElementById('hist-date').value;
    if (!date) { alert('請選擇日期'); return; }
    loadHistory(currentTab, date.replace(/-/g, '/'));
  }

  // 設定日期選擇器最大值為今天
  document.getElementById('hist-date').max = new Date().toISOString().slice(0, 10);

  // 每小時自動刷新（只在即時模式有效）
  setInterval(() => {
    if (currentMode === 'live') { delete liveCache[currentTab]; loadLive(currentTab); }
  }, 60 * 60 * 1000);

  loadLive('amt');
</script>
</body>
</html>
