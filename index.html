<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱門股券商進出排行</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
      font-size: 13px;
      background: #eef1f6;
      color: #1a1a2e;
    }

    /* ── 頁首 ── */
    .header {
      background: linear-gradient(135deg, #1a3a6b 0%, #2563a8 100%);
      color: white;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; white-space: nowrap; }
    .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
    .tab-group { display: flex; gap: 5px; }

    .tab-btn, .mode-btn, .refresh-btn, .query-btn {
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab-btn {
      border: 1.5px solid rgba(255,255,255,0.5);
      background: transparent;
      color: rgba(255,255,255,0.85);
    }
    .tab-btn:hover { background: rgba(255,255,255,0.15); }
    .tab-btn.active { background: white; color: #1a3a6b; font-weight: bold; border-color: white; }

    .mode-btn {
      border: 1.5px solid rgba(255,255,255,0.5);
      background: transparent;
      color: rgba(255,255,255,0.85);
    }
    .mode-btn:hover { background: rgba(255,255,255,0.15); }
    .mode-btn.active { background: #f0a500; color: white; border-color: #f0a500; font-weight: bold; }

    .refresh-btn {
      border: 1.5px solid rgba(255,255,255,0.5);
      background: transparent;
      color: white;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); }

    #hist-controls { display: none; align-items: center; gap: 6px; }
    #hist-controls input[type=date] {
      padding: 4px 8px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 12px;
      outline: none;
    }
    #hist-controls input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    .query-btn { border: none; background: #f0a500; color: white; font-weight: bold; }
    .query-btn:hover { background: #d4920a; }

    .update-time { font-size: 11px; opacity: 0.8; margin-left: auto; white-space: nowrap; }

    /* ── 主內容 ── */
    .content { padding: 12px; max-width: 1400px; margin: 0 auto; }
    .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
    .error   { text-align: center; padding: 20px; color: #c00; font-size: 13px; line-height: 1.8; }

    /* ── 卡片 ── */
    .card { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 12px; }
    .card-title { background: linear-gradient(90deg, #1a3a6b, #2563a8); color: white; padding: 7px 14px; font-weight: bold; font-size: 13px; }

    /* ── 彙總表（桌機：兩欄 / 手機：單欄）── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .sum-table { width: 100%; border-collapse: collapse; }
    .sum-table th { background: #dde6f0; color: #1a3a6b; padding: 5px 10px; font-size: 12px; text-align: center; border-bottom: 1px solid #c5d0de; }
    .sum-table td { padding: 4px 10px; border-bottom: 1px solid #edf0f4; font-size: 12px; }
    .sum-table td:last-child { text-align: right; font-weight: bold; }
    .sum-table tr:hover td { background: #f5f8fc; }
    .sum-table:first-child { border-right: 1px solid #d0d9e4; }

    /* ── 明細表 ── */
    .detail-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .main-table { width: 100%; border-collapse: collapse; min-width: 440px; }
    .main-table thead th { background: #dde6f0; color: #1a3a6b; padding: 6px 10px; text-align: center; border-bottom: 2px solid #b0c4d8; white-space: nowrap; font-size: 12px; }
    .main-table td { padding: 4px 10px; border-bottom: 1px solid #edf0f4; font-size: 12px; }
    .main-table tbody tr:not(.stock-hdr) td:first-child { text-align: center; color: #888; width: 36px; }
    .main-table td:nth-child(3), .main-table td:nth-child(4), .main-table td:nth-child(5) { text-align: right; }
    .main-table tbody tr:not(.stock-hdr):hover td { background: #f5f8fc; }

    .main-table tbody tr.stock-hdr td { background: linear-gradient(90deg, #1a3a6b, #2563a8); color: white; font-weight: bold; padding: 6px 10px; font-size: 13px; border-bottom: none; }
    .main-table tbody tr.stock-hdr td:last-child { text-align: right; }
    .main-table tbody tr.stock-hdr:hover td { filter: brightness(1.1); }

    /* ── 顏色（台股：正=紅 / 負=綠）── */
    .pos { background: #ffe4e4 !important; color: #c0392b; font-weight: bold; }
    .neg { background: #e4f4e4 !important; color: #27ae60; font-weight: bold; }
    .stock-hdr .pos { background: #ff9999 !important; color: #7b0000; border-radius: 3px; padding: 1px 5px; }
    .stock-hdr .neg { background: #99dd99 !important; color: #145214; border-radius: 3px; padding: 1px 5px; }

    /* ══ 手機版 RWD ══ */
    @media (max-width: 640px) {
      /* 頁首：標題佔一整行，其餘換行排列 */
      .header { padding: 7px 10px; gap: 6px; }
      .header h1 { font-size: 14px; width: 100%; }
      .divider { display: none; }
      .update-time { margin-left: 0; font-size: 11px; width: 100%; order: 99; }

      .tab-btn, .mode-btn, .refresh-btn, .query-btn { padding: 5px 11px; font-size: 12px; }
      #hist-controls input[type=date] { font-size: 12px; padding: 4px 7px; max-width: 140px; }

      /* 內容：減少邊距 */
      .content { padding: 7px; }
      .card { border-radius: 6px; margin-bottom: 8px; }
      .card-title { padding: 6px 10px; font-size: 12px; }

      /* 彙總：單欄 */
      .summary-grid { grid-template-columns: 1fr; }
      .sum-table:first-child { border-right: none; border-bottom: 2px solid #b0c4d8; }
      .sum-table th { padding: 4px 8px; font-size: 12px; }
      .sum-table td { padding: 4px 8px; font-size: 12px; }

      /* 明細表：緊湊 */
      .main-table { min-width: 360px; }
      .main-table thead th { padding: 5px 6px; font-size: 11px; }
      .main-table td { padding: 4px 6px; font-size: 12px; }
      .main-table tbody tr.stock-hdr td { padding: 5px 8px; font-size: 12px; }
      .main-table tbody tr:not(.stock-hdr) td:first-child { width: 28px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>熱門股券商進出排行</h1>

  <div class="tab-group">
    <button class="mode-btn active" id="mode-live" onclick="switchMode('live')">即時</button>
    <button class="mode-btn" id="mode-hist" onclick="switchMode('hist')">歷史</button>
  </div>

  <div class="divider"></div>

  <div class="tab-group">
    <button class="tab-btn active" id="btn-amt" onclick="switchTab('amt')">依成交金額</button>
    <button class="tab-btn" id="btn-vol" onclick="switchTab('vol')">依成交張數</button>
  </div>

  <button class="refresh-btn" id="live-refresh" onclick="manualRefresh()">↻ 重新整理</button>

  <div id="hist-controls">
    <input type="date" id="hist-date">
    <button class="query-btn" onclick="queryHistory()">查詢</button>
  </div>

  <span class="update-time" id="update-time">載入中...</span>
</div>

<div class="content">
  <div id="main-content" class="loading">資料載入中...</div>
</div>

<script>
  let currentMode = 'live';
  let currentTab  = 'amt';
  let liveCache   = {};

  const UNITS = { amt: '千元', vol: '張' };

  function fmt(n) { return n == null ? '-' : n.toLocaleString(); }
  function netClass(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : ''; }
  function netText(n) { if (n == null) return '-'; return (n > 0 ? '+' : '') + n.toLocaleString(); }

  function parseNum(s) {
    s = String(s).trim().replace(/,/g, '');
    if (!s || s === '-' || s.toUpperCase() === 'FALSE') return null;
    const n = parseFloat(s);
    return isNaN(n) ? null : Math.round(n);
  }

async function loadLive(tab) {
    document.getElementById('main-content').innerHTML = '<div class="loading">載入中...</div>';
    try {
      const resp = await fetch(`data/${tab}.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      liveCache[tab] = data;
      render(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error">載入失敗：${e.message}<br><small>請確認 GitHub Actions 已執行過一次</small></div>`;
    }
  }

  async function loadHistory(tab, date) {
    // date 格式 YYYY-MM-DD
    document.getElementById('main-content').innerHTML = '<div class="loading">查詢中...</div>';
    try {
      const resp = await fetch(`data/hist/${date}-${tab}.json?t=${Date.now()}`);
      if (!resp.ok) throw new Error(resp.status === 404 ? '該日無資料（假日或資料未公布）' : 'HTTP ' + resp.status);
      const data = await resp.json();
      document.getElementById('update-time').textContent = `歷史資料：${date}`;
      render(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error">${e.message}</div>`;
    }
  }

  function render(data) {
    const { unit, stocks } = data;
    if (data.updated_at)
      document.getElementById('update-time').textContent = `資料時間：${data.updated_at}`;

    const half = Math.ceil(stocks.length / 2);
    const sumRows = arr => arr.map(s => `<tr>
      <td>${s.rank} - ${s.name}(${s.code})</td>
      <td class="${netClass(s.total_net)}">${netText(s.total_net)}</td>
    </tr>`).join('');

    const summaryHtml = `
      <div class="card">
        <div class="card-title">各股買賣超合計（${unit}）</div>
        <div class="summary-grid">
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(stocks.slice(0, half))}
          </table>
          <table class="sum-table">
            <tr><th>股票</th><th>買賣超 (${unit})</th></tr>
            ${sumRows(stocks.slice(half))}
          </table>
        </div>
      </div>`;

    const buyLabel  = unit === '千元' ? '買進金額(千元)' : '總買量(張)';
    const sellLabel = unit === '千元' ? '賣出金額(千元)' : '總賣量(張)';

    const detailRows = stocks.map(s => `
      <tr class="stock-hdr">
        <td colspan="4">${s.rank} - ${s.name}(${s.code})</td>
        <td><span class="${netClass(s.total_net)}">${netText(s.total_net)}</span></td>
      </tr>
      ${s.brokers.map(b => `<tr>
        <td>${b.rank}</td><td>${b.name}</td>
        <td>${fmt(b.buy)}</td><td>${fmt(b.sell)}</td>
        <td class="${netClass(b.net)}">${netText(b.net)}</td>
      </tr>`).join('')}`).join('');

    document.getElementById('main-content').innerHTML = summaryHtml + `
      <div class="card">
        <div class="card-title">券商明細</div>
        <div class="detail-wrap">
          <table class="main-table">
            <thead><tr>
              <th>排行</th><th>證商名稱</th>
              <th>${buyLabel}</th><th>${sellLabel}</th><th>買賣超 (${unit})</th>
            </tr></thead>
            <tbody>${detailRows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`mode-${mode}`).classList.add('active');
    const isHist = mode === 'hist';
    document.getElementById('hist-controls').style.display = isHist ? 'flex' : 'none';
    document.getElementById('live-refresh').style.display  = isHist ? 'none' : '';
    if (mode === 'live') {
      liveCache[currentTab] ? render(liveCache[currentTab]) : loadLive(currentTab);
    } else {
      document.getElementById('main-content').innerHTML = '<div class="loading">請選擇日期後按查詢</div>';
      document.getElementById('update-time').textContent = '';
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${tab}`).classList.add('active');
    if (currentMode === 'live') {
      liveCache[tab] ? render(liveCache[tab]) : loadLive(tab);
    } else {
      const date = document.getElementById('hist-date').value;
      if (date) loadHistory(tab, date);
    }
  }

  function manualRefresh() {
    delete liveCache[currentTab];
    loadLive(currentTab);
  }

  function queryHistory() {
    const date = document.getElementById('hist-date').value;
    if (!date) { alert('請選擇日期'); return; }
    loadHistory(currentTab, date);
  }

  document.getElementById('hist-date').max = new Date().toISOString().slice(0, 10);

  setInterval(() => {
    if (currentMode === 'live') { delete liveCache[currentTab]; loadLive(currentTab); }
  }, 60 * 60 * 1000);

  loadLive('amt');
</script>
</body>
</html>
