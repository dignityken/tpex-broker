name: Fetch TPEX Data

on:
  schedule:
    - cron: '5 1-6 * * 1-5'
  workflow_dispatch:
    inputs:
      hist_date:
        description: 'Historical date (YYYY-MM-DD), leave empty for normal run'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch TPEX data
        run: python scripts/fetch_data.py
        env:
          HIST_DATE: ${{ github.event.inputs.hist_date }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: update data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
